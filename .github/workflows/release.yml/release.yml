name: Build and Release

on:
  push:
    tags:
      - 'v*'  # triggers on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binaries
        run: |
          # build for multiple platforms
          GOOS=linux GOARCH=amd64 go build -o dist/ht .
          GOOS=linux GOARCH=arm64 go build -o dist/ht .
          GOOS=darwin GOARCH=amd64 go build -o dist/ht .
          GOOS=windows GOARCH=amd64 go build -o dist/ht .

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}